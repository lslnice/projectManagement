services:
  backend:
    build: ./backend
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_PATH=/app/data/project_management.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
